<ion-header [translucent]="true">
  <app-shared-header
    [showBackButton]="true"
    (back)="goBack()"
  ></app-shared-header>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-searchbar
    [ngModel]="searchQuery()"
    (ngModelChange)="searchQuery.set($event)"
    placeholder="Search by player name..."
    show-clear-button="focus"
    class="ion-padding"
  />

  <ion-list class="ion-padding" lines="none">
    @for (player of filteredPlayers(); track player.id) {
    <app-player-item
      [player]="player"
      [selectable]="true"
      [selected]="isSelected(player.id)"
      (selectionChange)="togglePlayer(player.id, $event)"
    ></app-player-item>
    }
  </ion-list>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="footer-actions">
      <ion-button fill="outline" color="medium" (click)="goBack()"
        >Cancel</ion-button
      >
      <ion-button fill="solid" color="primary" (click)="confirmImport()"
        >Confirm Import</ion-button
      >
    </div>
  </ion-toolbar>
</ion-footer>
