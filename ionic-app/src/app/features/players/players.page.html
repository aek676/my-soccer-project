<ion-header [translucent]="true">
  <app-shared-header></app-shared-header>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="ion-padding">
    <h1 class="page-title">Player Database</h1>

    <ion-searchbar
      [ngModel]="searchQuery()"
      (ngModelChange)="searchQuery.set($event)"
      placeholder="Search players..."
      show-clear-button="focus"
    ></ion-searchbar>

    <app-filter-chips
      [filters]="filters"
      [(selected)]="selectedFilter"
    ></app-filter-chips>
  </div>

  <ion-list class="ion-padding" lines="none">
    @for (player of filteredPlayers(); track player.id) {
    <app-player-item [player]="player" (tap)="navigateToProfile($event)"></app-player-item>
    }
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end" class="ion-margin">
    <ion-fab-button (click)="openAddActionSheet()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
