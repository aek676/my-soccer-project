<ion-tabs>
  <ion-tab-bar slot="bottom">
    @for (tab of tabs$ | async; track tab.tab) {
      <ion-tab-button [tab]="tab.tab" [href]="'/tabs/' + tab.tab">
        <ion-icon aria-hidden="true" [name]="tab.icon"></ion-icon>
        <ion-label>{{ tab.label }}</ion-label>
      </ion-tab-button>
    }
  </ion-tab-bar>
</ion-tabs>
