<body class="antialiased pb-32">
<!-- TopAppBar -->
<nav class="flex items-center justify-between px-md h-16 w-full max-w-full bg-surface border-b border-hairline sticky top-0 z-50">
<div class="flex items-center gap-xs">
<button aria-label="Go back" class="p-xs text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="font-title-lg text-title-lg-mobile font-bold text-primary tracking-tight">
    MSP
  </div>
<div class="w-10"></div> <!-- Placeholder for balance -->
</nav>
<!-- Main Content Canvas -->
<main class="max-w-4xl mx-auto px-md md:px-lg py-xl">
<header class="mb-xl text-center md:text-left flex flex-col md:flex-row items-center gap-lg">
<!-- Image Upload Area -->
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-strong border border-hairline flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-outline text-4xl group-hover:text-primary transition-colors">photo_camera</span>
</div>
<div class="absolute inset-0 rounded-full ring-2 ring-transparent group-hover:ring-primary/20 transition-all"></div>
<div class="absolute bottom-0 right-0 bg-primary text-on-primary rounded-full p-2 shadow-sm">
<span class="material-symbols-outlined text-sm">add</span>
</div>
</div>
<div>
<h1 class="font-display-lg text-display-lg text-on-surface">Register New Player</h1>
<p class="font-body-md text-body-md text-body mt-2">Enter the details below to add a new athlete to the roster.</p>
</div>
</header>
<form class="space-y-section">
<!-- Section 1: Personal Info -->
<section class="bg-surface p-lg md:p-xl rounded-xl border border-hairline">
<h2 class="font-title-sm text-title-sm text-on-surface mb-lg pb-sm border-b border-hairline">Personal Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div>
<label class="label-text font-semibold">Alias / Nickname</label>
<input class="input-field bg-white" placeholder="e.g. Magic" type="text">
</div>
<div>
<label class="label-text font-semibold">First Name</label>
<input class="input-field bg-white" placeholder="First Name" type="text">
</div>
<div>
<label class="label-text font-semibold">Last Name</label>
<input class="input-field bg-white" placeholder="Last Name" type="text">
</div>
<div>
<label class="label-text font-semibold">Birthdate</label>
<input class="input-field text-on-surface-variant bg-white" type="date">
</div>
<div>
<label class="label-text font-semibold">Age</label>
<input class="input-field bg-white" disabled="" placeholder="Auto-calculated" type="number">
</div>
<div>
<label class="label-text font-semibold">Nationality</label>
<select class="input-field appearance-none bg-white">
<option disabled="" selected="" value="">Select nationality...</option>
<option>United States</option>
<option>Spain</option>
<option>Brazil</option>
<option>France</option>
</select>
</div>
</div>
</section>
<!-- Section 2: Physical Stats -->
<section class="bg-surface p-lg md:p-xl rounded-xl border border-hairline">
<h2 class="font-title-sm text-title-sm text-on-surface mb-lg pb-sm border-b border-hairline">Physical Stats</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div>
<label class="label-text font-semibold">Height (cm)</label>
<div class="relative">
<input class="input-field pr-12 bg-white" placeholder="185" type="number">
<span class="absolute right-md top-1/2 -translate-y-1/2 text-muted font-body-sm">cm</span>
</div>
</div>
<div>
<label class="label-text font-semibold">Weight (kg)</label>
<div class="relative">
<input class="input-field pr-12 bg-white" placeholder="80" type="number">
<span class="absolute right-md top-1/2 -translate-y-1/2 text-muted font-body-sm">kg</span>
</div>
</div>
</div>
</section>
<!-- Section 3: Sporting Info -->
<section class="bg-surface p-lg md:p-xl rounded-xl border border-hairline">
<h2 class="font-title-sm text-title-sm text-on-surface mb-lg pb-sm border-b border-hairline">Sporting Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div>
<label class="label-text font-semibold">League</label>
<input class="input-field bg-white" placeholder="e.g. Premier League" type="text">
</div>
<div>
<label class="label-text font-semibold">Team</label>
<input class="input-field bg-white" placeholder="e.g. Arsenal FC" type="text">
</div>
<div>
<label class="label-text font-semibold">Primary Position</label>
<select class="input-field appearance-none bg-white">
<option disabled="" selected="" value="">Select position...</option>
<option>Goalkeeper</option>
<option>Defender</option>
<option>Midfielder</option>
<option>Forward</option>
</select>
</div>
<div>
<label class="label-text font-semibold">Shirt Number</label>
<input class="input-field bg-white" placeholder="e.g. 10" type="number">
</div>
</div>
</section>
<!-- Section 4: Geolocation -->
<section class="bg-surface p-lg md:p-xl rounded-xl border border-hairline">
<h2 class="font-title-sm text-title-sm text-on-surface mb-lg pb-sm border-b border-hairline">Current Location</h2>
<p class="font-body-sm text-body mb-md">Pin the player's primary training or home location.</p>
<div class="relative w-full h-64 bg-surface-strong rounded-[24px] border border-hairline overflow-hidden group cursor-crosshair">
<!-- Placeholder for Map Image -->
<img alt="Map Placeholder" class="absolute inset-0 w-full h-full object-cover opacity-70 grayscale transition-opacity group-hover:opacity-100 group-hover:grayscale-0" data-alt="A clean, modern digital map interface displaying a stylized city grid. The map uses a very light mode color palette with soft gray roads on a pure white background, avoiding strong colors to maintain a minimalist aesthetic. A single, distinct primary blue pin marker indicates a specific location in the center of the frame. The lighting is bright and even, giving it a premium, institutional application feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAglb_pC6XgHuHSo3QPXKxMlVU9_4G0H9diRLP1lt_nMA6-37PzLmDYUJEXmcZtzYIJuNdiUTxxkhWxomw7YLgF1Se61G0ULMQ3-og0HHeV2vvCN23BTswY8dWtiw1Ygzc0jzOL_bcaWK7EYVuGrkUUp6wDfKIvQ5YUyE7D8B6-aZUHm4lIlhziw4UrXyyxOvAXsQ-A7wbjKWD8z80_EjtZkaLasE1gOrRXYBNlKbk1NiE6zNoV2Lb5NLOBh79N0dyhBLkajiYX2TlJ">
<!-- Center Pin -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="bg-primary text-on-primary rounded-full p-2 shadow-lg animate-bounce">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="w-4 h-1 bg-ink/20 rounded-[50%] mt-1 filter blur-[1px]"></div>
</div>
</div>
<div class="mt-md flex gap-sm">
<input class="input-field flex-1 bg-white" placeholder="Search city or address..." type="text">
<button class="px-lg bg-surface-container-high text-on-surface font-button text-button rounded-full hover:bg-surface-dim transition-colors border border-hairline" type="button">Locate</button>
</div>
</section>
</form>
</main>
<!-- Action Footer (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-hairline p-md md:p-lg flex justify-end gap-md z-50">
<button class="px-xl py-sm font-button text-button text-on-surface-variant bg-transparent border border-hairline rounded-full hover:bg-surface-container-low transition-colors" type="button">
    Cancel
  </button>
<button class="px-xl py-sm font-button text-button text-on-primary bg-primary rounded-full hover:bg-primary-container transition-colors shadow-sm" type="submit">
    Save Player
  </button>
</div>
