<style>
        /* Mobile-first utility resets */
        html, body {
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
        
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #0a0b0d !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-canvas min-h-screen flex flex-col items-center justify-center font-sans antialiased text-ink px-base sm:px-lg safe-area-pt safe-area-pb selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Container (Restricted width for mobile feel on desktop) -->
<main class="w-full max-w-[400px] flex flex-col gap-xl">
<!-- Header -->
<header class="w-full flex justify-center pt-xl">
<h1 class="font-display-md text-display-md text-ink tracking-tight">MSP</h1>
</header>
<!-- Login Card -->
<div class="bg-surface-soft rounded-2xl border border-hairline p-lg sm:p-xl flex flex-col gap-lg w-full">
<div class="flex flex-col gap-xxs">
<h2 class="font-title-lg text-title-lg text-ink font-normal">Sign In</h2>
<p class="font-body-sm text-body-sm text-muted">Access your sports management dashboard</p>
</div>
<form class="flex flex-col gap-base" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="sr-only" for="email">Email address</label>
<div class="relative">
<input autocomplete="email" class="w-full h-[48px] bg-canvas border border-hairline rounded-lg px-base font-body-md text-body-md text-ink placeholder:text-muted focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-colors" id="email" name="email" placeholder="Email address" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="sr-only" for="password">Password</label>
<div class="relative">
<input autocomplete="current-password" class="w-full h-[48px] bg-canvas border border-hairline rounded-lg px-base pr-12 font-body-md text-body-md text-ink placeholder:text-muted focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-colors" id="password" name="password" placeholder="Password" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-ink p-2 transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="font-caption-strong text-caption-strong text-primary hover:text-primary-fixed-variant transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[48px] bg-primary text-on-primary font-button text-button rounded-full mt-2 hover:bg-primary-fixed-variant active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="submit">
                    Sign In
                </button>
</form>
</div>
<!-- Footer Actions -->
<div class="flex flex-col items-center gap-md">
<p class="font-body-md text-body-md text-muted">
                Don't have an account? 
                <a class="text-primary font-body-strong text-body-strong hover:underline underline-offset-4 ml-1" href="#">Sign up</a>
</p>
<div class="w-full h-px bg-hairline relative flex justify-center items-center my-2">
<span class="bg-canvas px-4 font-caption text-caption text-muted absolute">OR</span>
</div>
<button class="w-full h-[48px] bg-transparent border border-outline-variant text-ink font-button text-button rounded-full hover:bg-surface-container-low active:bg-surface-container transition-colors" type="button">
                Continue as Guest
            </button>
</div>
</main>
</body></html>
