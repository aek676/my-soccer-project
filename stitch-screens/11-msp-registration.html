<body class="bg-canvas text-on-surface flex flex-col min-h-screen">
<!-- Linear Flow Header (Navigation Suppressed per Semantic Shell Mandate) -->
<header class="w-full flex justify-center items-center py-lg px-base border-b border-hairline bg-canvas z-50">
<h1 class="font-display-sm text-display-sm font-normal text-ink tracking-tight">MSP</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-base py-section">
<!-- Registration Card -->
<div class="w-full max-w-[400px] bg-surface-soft border border-hairline rounded-[24px] p-lg">
<!-- Heading -->
<div class="mb-xl text-center">
<h2 class="font-display-sm text-display-sm font-normal text-ink">Create Account</h2>
</div>
<!-- Registration Form -->
<form action="#" class="flex flex-col gap-base" method="POST">
<!-- Username Input -->
<div class="flex flex-col gap-xs">
<label class="font-caption-strong text-caption-strong text-muted ml-xs" for="username">Username</label>
<input class="w-full h-[48px] px-base rounded-xl border border-hairline bg-canvas text-body-md font-body-md text-on-surface placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-none" id="username" name="username" placeholder="Enter your username" type="text"/>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-caption-strong text-caption-strong text-muted ml-xs" for="email">Email Address</label>
<input class="w-full h-[48px] px-base rounded-xl border border-hairline bg-canvas text-body-md font-body-md text-on-surface placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-caption-strong text-caption-strong text-muted ml-xs" for="password">Password</label>
<input class="w-full h-[48px] px-base rounded-xl border border-hairline bg-canvas text-body-md font-body-md text-on-surface placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-none" id="password" name="password" placeholder="Create a password" type="password"/>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-caption-strong text-caption-strong text-muted ml-xs" for="confirm_password">Confirm Password</label>
<input class="w-full h-[48px] px-base rounded-xl border border-hairline bg-canvas text-body-md font-body-md text-on-surface placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-none" id="confirm_password" name="confirm_password" placeholder="Confirm your password" type="password"/>
</div>
<!-- CTA Button -->
<button class="mt-md w-full h-[48px] bg-primary-container text-on-primary font-button text-button rounded-full flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                    Register
                </button>
</form>
<!-- Footer / Sign-in Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-muted">
                    Already have an account? 
                    <a class="text-primary-container font-body-strong text-body-strong hover:underline ml-xs" href="#">Sign in</a>
</p>
</div>
</div>
</main>
</body></html>
