name: Frontend - Ionic Angular CI/CD

on:
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ionic-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun ci

      - name: Execute Linter with Reviewdog
        uses: reviewdog/action-eslint@v1
        if: ${{ !inputs.push }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          workdir: ionic-app
          eslint_flags: "src/"

      - name: Unit test and Coverage
        run: bun run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Setup LCOV
        uses: hrishikesh-kadam/setup-lcov@v1

      - name: Report code Coverage
        if: ${{ !inputs.push }}
        uses: zgosalvez/github-actions-report-lcov@v7
        with:
          working-directory: ionic-app
          coverage-files: ionic-app/coverage/app/lcov.info
          # TODO: uncomment after
          # minimum-coverage: 90
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: Build Production
        run: bun run build -- --configuration production

      - name: Save Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ionic-build-production
          path: ionic-app/www/
          retention-days: 1

  preview:
    needs: build-and-test
    if: ${{ !inputs.push }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ionic-build-production
          path: ionic-app/www

      - name: Firebase preview deploy
        id: firebase-deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_SOCCER_PROJECT_494521 }}
          projectId: my-soccer-project-494521
          entryPoint: ionic-app

      - name: Save preview URL to repo
        if: ${{ !inputs.push }}
        run: bash .github/scripts/save-preview-url.sh "${{ steps.firebase-deploy.outputs.details_url }}" "${{ secrets.GITHUB_TOKEN }}"

  deploy:
    needs: build-and-test
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ionic-build-production
          path: ionic-app/www

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_SOCCER_PROJECT_494521 }}
          channelId: live
          projectId: my-soccer-project-494521
          entryPoint: ionic-app
