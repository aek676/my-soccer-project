name: Frontend - Ionic Angular CI/CD

on:
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ionic-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun ci

      - name: Execute Linter with Reviewdog
        uses: reviewdog/action-eslint@v1
        if: ${{ !inputs.push }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          workdir: ionic-app
          eslint_flags: "src/"

      - name: Unit test and Coverage
        run: bun run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Setup LCOV
        uses: hrishikesh-kadam/setup-lcov@v1

      - name: Report code Coverage
        if: ${{ !inputs.push }}
        uses: zgosalvez/github-actions-report-lcov@v7
        with:
          working-directory: ionic-app
          coverage-files: ionic-app/coverage/app/lcov.info
          minimum-coverage: 75
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: Build Production
        run: bun run build -- --configuration production

      - name: Save Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ionic-build-production
          path: ionic-app/www/
          retention-days: 1

      - name: Build for Emulator
        run: bun run build -- --configuration=emulator

      - name: Save Emulator Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ionic-build-emulator
          path: ionic-app/www/
          retention-days: 1

  preview:
    needs: build-and-test
    if: ${{ !inputs.push }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ionic-build-production
          path: ionic-app/www

      - name: Firebase preview deploy
        id: firebase-deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_SOCCER_PROJECT_494521 }}
          projectId: my-soccer-project-494521
          entryPoint: .

  build-apk:
    needs: build-and-test
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ionic-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ionic-build-production
          path: ionic-app/www

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync
        run: bunx cap sync android

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ionic-app/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: ionic-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  deploy:
    needs: build-and-test
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ionic-build-production
          path: ionic-app/www

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_SOCCER_PROJECT_494521 }}
          channelId: live
          projectId: my-soccer-project-494521
          entryPoint: .
