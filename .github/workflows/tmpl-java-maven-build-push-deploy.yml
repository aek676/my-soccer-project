name: Template - Build and Push

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      push:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Run Tests, Coverage and Static Analysis
        run: ./mvnw verify

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "${{ inputs.working_directory }}/**/target/surefire-reports/TEST-*.xml"

      - name: Add JaCoCo Report to PR
        uses: madrapps/jacoco-report@v1
        if: github.event_name == 'pull_request'
        with:
          path: ${{ inputs.working_directory }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1
        if: always()
        with:
          reviewdog_version: latest

      - name: Reviewdog PR Code Review (SpotBugs)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'pull_request'
        run: |
          if [ -f target/spotbugsXml.xml ]; then
            cat target/spotbugsXml.xml | \
            reviewdog -f=spotbugs \
                      -reporter=github-pr-review \
                      -filter-mode=added \
                      -fail-on-error=true \
                      -level=warning
          else
            echo "SpotBugs report not found, skipping Reviewdog"
          fi

      - name: Build image with Maven
        env:
          BP_JVM_CDS_ENABLED: "true"
        run: |
          ./mvnw spring-boot:build-image -Dspring-boot.build-image.imageName=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/${{ inputs.image_name }}:latest

      - name: Authenticate to GCP via OIDC
        if: ${{ inputs.push }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        if: ${{ inputs.push }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: ${{ inputs.push }}
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Tag and Push images to Artifact Registry
        if: ${{ inputs.push }}
        run: |
          docker tag us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/${{ inputs.image_name }}:latest \
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/${{ inputs.image_name }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/${{ inputs.image_name }}:latest &
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/${{ inputs.image_name }}:${{ github.sha }} &
          wait

      - name: Azure Login
        if: ${{ inputs.push }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        if: ${{ inputs.push }}
        run: |
          az containerapp update \
            --name ${{ inputs.image_name }} \
            --resource-group rg-my-soccer-project-eureka \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/${{ inputs.image_name }}:${{ github.sha }}
