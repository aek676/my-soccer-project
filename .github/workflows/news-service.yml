name: News Service CI

on:
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-service
    permissions:
      contents: read
      id-token: write
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 8
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"
          cache: "maven"

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Run Tests, Coverage and Static Analysis
        run: ./mvnw verify

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "news-service/**/target/surefire-reports/TEST-*.xml"

      - name: Add JaCoCo Report to PR
        uses: madrapps/jacoco-report@v1.7.2
        if: github.event_name == 'pull_request'
        with:
          paths: news-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: Code Coverage
          update-comment: true

      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1
        if: always()
        with:
          reviewdog_version: latest

      - name: Reviewdog PR Code Review (Checkstyle)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'pull_request'
        run: |
          if [ -f target/checkstyle-result.xml ]; then
            cat target/checkstyle-result.xml | \
            reviewdog -f=checkstyle \
                      -reporter=github-pr-review \
                      -filter-mode=added \
                      -fail-level=none \
                      -level=warning
          else
            echo "Checkstyle report not found, skipping Reviewdog"
          fi

      - name: SpotBugs PR Code Review
        uses: jwgmeligmeyling/spotbugs-github-action@master
        if: github.event_name == 'pull_request'
        with:
          path: news-service/target/spotbugsXml.xml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP via OIDC
        if: ${{ inputs.push }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        if: ${{ inputs.push }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        if: ${{ inputs.push }}
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        if: ${{ inputs.push }}
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        if: ${{ inputs.push }}
        uses: docker/build-push-action@v7
        with:
          context: ./news-service
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/news-service:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/news-service:${{ github.sha }}

      - name: Azure Login
        if: ${{ inputs.push }}
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        if: ${{ inputs.push }}
        run: |
          az containerapp update \
            --name news-service \
            --resource-group rg-my-soccer-project-eureka \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/news-service:${{ github.sha }}
