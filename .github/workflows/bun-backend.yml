name: Bun Backend CI

on:
  push:
    paths:
      - "bun-backend/**"
  pull_request:
    paths:
      - "bun-backend/**"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

  biome:
    name: runner / Biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: mongolyy/reviewdog-action-biome@v2
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun run typecheck

  build:
    needs: [biome, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: bun-backend-binary
          path: dist/server

  test:
    needs: build
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24.0.5
        options: --privileged
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun test
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test/junit.xml
