name: Bun Backend CI

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bun-backend
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: biomejs/setup-biome@v2
        with:
          version: latest
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Typecheck
        run: bun run typecheck

      - name: Run Biome
        run: biome ci .
        continue-on-error: true

      - uses: mongolyy/reviewdog-action-biome@v2
        if: github.event_name == 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Upload Artifacts (Binary)
        uses: actions/upload-artifact@v4
        with:
          name: bun-backend-binary
          path: bun-backend/dist/server

      - name: Upload Artifacts (Test Report)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: bun-backend/test/junit.xml
