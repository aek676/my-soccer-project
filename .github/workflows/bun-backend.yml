name: Bun Backend CI

on:
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bun-backend
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      checks: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: biomejs/setup-biome@v2
        with:
          version: 2.4.14

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun ci

      - name: Typecheck
        run: bun run typecheck

      - name: Run Biome
        run: biome ci .
        continue-on-error: true

      - uses: mongolyy/reviewdog-action-biome@v2
        if: ${{ !inputs.push }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          workdir: bun-backend

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Setup LCOV
        if: always()
        uses: hrishikesh-kadam/setup-lcov@v1

      - name: Report code Coverage
        if: always() && !inputs.push
        uses: zgosalvez/github-actions-report-lcov@v7
        with:
          working-directory: bun-backend
          coverage-files: bun-backend/reports/coverage/lcov.info
          minimum-coverage: 80
          artifact-name: bun-backend-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: Upload test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Bun Backend Tests
          path: bun-backend/reports/junit.xml
          reporter: jest-junit

      - name: Upload Artifacts (Binary)
        uses: actions/upload-artifact@v4
        with:
          name: bun-backend-binary
          path: bun-backend/dist/server

      - name: Upload Artifacts (Test Report)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: bun-backend/reports/junit.xml

      - name: Authenticate to GCP via OIDC
        if: inputs.push
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        if: inputs.push
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        if: inputs.push
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        if: inputs.push
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        if: inputs.push
        uses: docker/build-push-action@v7
        with:
          context: ./bun-backend
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/bun-backend:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/bun-backend:${{ github.sha }}

      - name: Azure Login
        if: inputs.push
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        if: inputs.push
        run: |
          az containerapp update \
            --name bun-backend \
            --resource-group rg-my-soccer-project-eureka \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/soccer-artifact-repo/bun-backend:${{ github.sha }}
