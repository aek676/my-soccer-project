name: Playwright Tests

on:
  workflow_call:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testE2E
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun ci

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: Set BASE_URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash $GITHUB_WORKSPACE/.github/scripts/fetch-preview-url.sh "$GITHUB_TOKEN" "$GITHUB_HEAD_REF"

      - name: Run Playwright tests
        run: PLAYWRIGHT_JSON_OUTPUT_NAME=results.json npx playwright test --reporter=json
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - uses: daun/playwright-report-summary@v3
        with:
          report-file: testE2E/results.json

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: testE2E/playwright-report/
          retention-days: 7
