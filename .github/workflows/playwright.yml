name: Playwright Tests

on:
  workflow_call:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun ci

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps
        working-directory: testE2E

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ionic-build-emulator
          path: ionic-app/www

      - name: Install Firebase CLI
        run: bun install -g firebase-tools

      - name: Setup Java 21 for Firebase Emulator
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Run Playwright tests
        run: firebase emulators:exec "cd testE2E && bun run test"

      - uses: daun/playwright-report-summary@v3
        with:
          report-file: testE2E/results.json

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: testE2E/playwright-report/
          retention-days: 7
